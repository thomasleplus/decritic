---
name: Go

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  go:
    name: Build with Go
    runs-on: ubuntu-latest
    steps:
      - name: Set REPOSITORY
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          echo "REPOSITORY=${GITHUB_REPOSITORY#*/}" >> "${GITHUB_ENV}"
      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set SOURCE_DATE_EPOCH
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "${GITHUB_ENV}"
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          check-latest: true
        id: go
      - name: Get dependencies
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          make dep
      - name: Vet
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          make vet
      - name: Static Check
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          make staticcheck
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          make compile
      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          make test
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.REPOSITORY }}
          path: bin/
